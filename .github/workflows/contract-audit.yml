name: Contract Audit

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'contracts/**'
      - 'scripts/contract-audit.js'
      - '.github/workflows/contract-audit.yml'
      - 'package.json'
  pull_request:
    paths:
      - 'contracts/**'
      - 'scripts/contract-audit.js'
      - '.github/workflows/contract-audit.yml'
      - 'package.json'
  workflow_dispatch:

jobs:
  audit-contract:
    name: Slither and Mythril
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run contract audit
        env:
          AUDIT_FAIL_ON_SEVERITY: low
        run: npm run audit:contracts

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: contract-audit-reports
          path: contracts/reports/security
          if-no-files-found: error