name: CI — CrewAI Integration

on:
  push:
    branches:
      - master
      - main
    paths:
      - "integrations/crewai/**"
      - "sdk-python/**"
      - "package.json"
      - ".github/workflows/ci-crewai.yml"
  pull_request:
    paths:
      - "integrations/crewai/**"
      - "sdk-python/**"
      - "package.json"
      - ".github/workflows/ci-crewai.yml"
  workflow_dispatch:

concurrency:
  group: ci-crewai-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crewai:
    name: CrewAI Python ${{ matrix.python-version }} - Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK Python in dev mode
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install CrewAI integration in dev mode
        working-directory: integrations/crewai
        run: python -m pip install -e ".[dev]"

      - name: Install CrewAI runtime extra
        if: matrix.python-version == '3.12'
        working-directory: integrations/crewai
        run: python -m pip install -e ".[runtime]"

      - name: Lint integration package
        if: matrix.python-version == '3.12'
        working-directory: integrations/crewai
        run: python -m ruff check src/ tests/ examples/

      - name: Type-check integration package
        if: matrix.python-version == '3.12'
        working-directory: integrations/crewai
        run: python -m mypy src/

      - name: Run integration tests
        working-directory: integrations/crewai
        run: python -m pytest tests/ -q

      - name: Run real CrewAI runtime smoke test
        if: matrix.python-version == '3.12'
        working-directory: integrations/crewai
        run: python -m pytest tests/test_runtime_smoke.py -q

      - name: Verify CrewAI public factory entrypoint
        if: matrix.python-version == '3.12'
        run: python -c "from agent_did_crewai import create_agent_did_crewai_integration; print(create_agent_did_crewai_integration.__name__)"

      - name: Build integration package
        if: matrix.python-version == '3.12'
        working-directory: integrations/crewai
        run: python -m build