name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, Test, and Conformance
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sdk/package-lock.json
            contracts/package-lock.json
            integrations/langchain/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install SDK dependencies
        run: npm --prefix sdk ci

      - name: Install contract dependencies
        run: npm --prefix contracts ci

      - name: Install LangChain integration dependencies
        run: npm --prefix integrations/langchain ci

      - name: Run LangChain integration tests
        run: npm run test:langchain

      - name: Run RFC-001 conformance suite
        run: npm run conformance:rfc001
