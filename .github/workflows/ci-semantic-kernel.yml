name: CI - Semantic Kernel Integration

on:
  push:
    branches:
      - master
      - main
    paths:
      - "integrations/semantic-kernel/**"
      - "sdk-python/**"
      - "package.json"
      - ".github/workflows/ci-semantic-kernel.yml"
  pull_request:
    paths:
      - "integrations/semantic-kernel/**"
      - "sdk-python/**"
      - "package.json"
      - ".github/workflows/ci-semantic-kernel.yml"
  workflow_dispatch:

concurrency:
  group: ci-semantic-kernel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic-kernel:
    name: Semantic Kernel Python ${{ matrix.python-version }} - Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK Python in dev mode
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Semantic Kernel integration in dev mode
        working-directory: integrations/semantic-kernel
        run: python -m pip install -e ".[dev]"

      - name: Install Semantic Kernel runtime extra
        if: matrix.python-version == '3.12'
        working-directory: integrations/semantic-kernel
        run: python -m pip install -e ".[runtime]"

      - name: Lint integration package
        if: matrix.python-version == '3.12'
        working-directory: integrations/semantic-kernel
        run: python -m ruff check src/ tests/ examples/

      - name: Type-check integration package
        if: matrix.python-version == '3.12'
        working-directory: integrations/semantic-kernel
        run: python -m mypy src/

      - name: Run integration tests
        working-directory: integrations/semantic-kernel
        run: python -m pytest tests/ -q

      - name: Run semantic-kernel runtime smoke test
        if: matrix.python-version == '3.12'
        working-directory: integrations/semantic-kernel
        run: python -m pytest tests/test_runtime_smoke.py -q

      - name: Build integration package
        if: matrix.python-version == '3.12'
        working-directory: integrations/semantic-kernel
        run: python -m build